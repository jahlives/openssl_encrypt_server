default:
  tags:
    - amd64

stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir ruff
  script:
    - ruff check . --select E,F,W --ignore E501
  allow_failure: true

# ---------------------------------------------------------------------------
# Unit Tests
# ---------------------------------------------------------------------------
test:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y libssl3 pkg-config && rm -rf /var/lib/apt/lists/*
    - pip install --no-cache-dir -r requirements.txt
    - pip install --no-cache-dir pytest pytest-asyncio httpx
    # Create package symlink so 'from openssl_encrypt_server import ...' resolves
    - ln -s "$CI_PROJECT_DIR" "$(dirname $CI_PROJECT_DIR)/openssl_encrypt_server"
  script:
    - PYTHONPATH="$(dirname $CI_PROJECT_DIR)" python -m pytest unittests/ -v --tb=short
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Docker Build (only on main and release branches)
# Requires runner with Docker socket access or DinD support.
# To enable: configure runner with volumes = ["/var/run/docker.sock:/var/run/docker.sock"]
# or a runner with privileged DinD support.
# ---------------------------------------------------------------------------
docker-build:
  stage: build
  tags:
    - docker-build
  image: docker:24
  variables:
    IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$IMAGE_TAG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_BRANCH =~ /^releases\//
      when: manual
