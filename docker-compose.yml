version: '3.8'

networks:
  server-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: openssl-encrypt-db
    restart: unless-stopped
    networks:
      server-network:
        ipv4_address: 172.28.0.2
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openssl_server}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-openssl_encrypt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openssl_server}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # API Server
  api:
    build: .
    container_name: openssl-encrypt-api
    restart: unless-stopped
    networks:
      server-network:
        ipv4_address: 172.28.0.3
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Database
      POSTGRES_USER: ${POSTGRES_USER:-openssl_server}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-openssl_encrypt}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Auth Secrets
      KEYSERVER_TOKEN_SECRET: ${KEYSERVER_TOKEN_SECRET:-keyserver-secret-min-32-chars-CHANGE-ME}
      TELEMETRY_TOKEN_SECRET: ${TELEMETRY_TOKEN_SECRET:-telemetry-secret-min-32-chars-CHANGE-ME}

      # Modules
      KEYSERVER_ENABLED: ${KEYSERVER_ENABLED:-true}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    name: openssl-encrypt-postgres-data
