version: '3.8'

networks:
  server-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: openssl-encrypt-db
    restart: unless-stopped
    networks:
      server-network:
        ipv4_address: 172.28.0.2
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openssl_server}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-openssl_encrypt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openssl_server} -d ${POSTGRES_DB:-openssl_encrypt}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # API Server
  api:
    build: .
    container_name: openssl-encrypt-api
    restart: unless-stopped
    networks:
      server-network:
        ipv4_address: 172.28.0.3
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Database
      POSTGRES_USER: ${POSTGRES_USER:-openssl_server}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-openssl_encrypt}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Auth Secrets
      KEYSERVER_TOKEN_SECRET: ${KEYSERVER_TOKEN_SECRET:?KEYSERVER_TOKEN_SECRET must be set (min 32 chars)}
      TELEMETRY_TOKEN_SECRET: ${TELEMETRY_TOKEN_SECRET:?TELEMETRY_TOKEN_SECRET must be set (min 32 chars)}

      # Modules
      KEYSERVER_ENABLED: ${KEYSERVER_ENABLED:-true}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      PEPPER_ENABLED: ${PEPPER_ENABLED:-false}
      INTEGRITY_ENABLED: ${INTEGRITY_ENABLED:-false}

      # Pepper Module
      PEPPER_AUTH_MODE: ${PEPPER_AUTH_MODE:-proxy}
      PEPPER_TOTP_SECRET_KEY: ${PEPPER_TOTP_SECRET_KEY}
      PEPPER_DEADMAN_ENABLED: ${PEPPER_DEADMAN_ENABLED:-true}

      # Integrity Module
      INTEGRITY_AUTH_MODE: ${INTEGRITY_AUTH_MODE:-proxy}

      # Keyserver email registration
      KEYSERVER_BASE_URL: ${KEYSERVER_BASE_URL:-}

      # SMTP (email registration)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_VERIFY_TLS: ${SMTP_VERIFY_TLS:-true}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    name: openssl-encrypt-postgres-data
